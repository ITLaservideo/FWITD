<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>(() => { document.addEventListener("contextmenu", function (e) { e.preventDefault(); }); document.addEventListener("wheel", function (e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false }); document.addEventListener("keydown", function (e) { if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) { e.preventDefault(); } }); })();</script>
    <title>DashboardLettoreBarcode</title>
</head>

<body>
    <div class="dlb-page" id="dlb-page">
        <div class="dlb-header">
            <div class="dlb-title" id="dlb-title" data-i18n="lettore FM32 / FM25"></div>
            <div class="dlb-actions-row" id="dlb-actions-row"></div>
            <div class="dlb-port-select-container" id="dlb-port-select-container"></div>
        </div>
        <div class="dlb-section">
            <div class="dlb-section-title" data-i18n="commands"></div>
            <div class="dlb-commands-grid" id="dlb-commands-grid-general"></div>
        </div>
        <div class="dlb-section-row">
            <div class="dlb-section">
                <div class="dlb-section-title" data-i18n="read operations"></div>
                <div class="dlb-commands-grid" id="dlb-commands-grid-read"></div>
            </div>
            <div class="dlb-section">
                <div class="dlb-section-title" data-i18n="write operations"></div>
                <div class="dlb-commands-grid" id="dlb-commands-grid-write"></div>
            </div>
        </div>
        <div class="dlb-section">
            <div class="dlb-section-title" data-i18n="test / bypass"></div>
            <div class="dlb-commands-grid" id="dlb-commands-grid-test_bypass"></div>
        </div>
        <div class="dlb-section dlb-log-section">
            <div class="dlb-log-container" id="dlb-log-container"></div>
        </div>
    </div>
</body>

</html>
